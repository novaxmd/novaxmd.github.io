<body>
<header class="app-header">
  <div class="controls-with-left">
    <div class="header-top">
      <h1>OpenNana Prompt Gallery</h1>
      <p class="tagline">Browse, filter and search prompt case gallery, quickly copy prompts, explore inspiration.</p>
    </div>

    <div class="control-bar">
      <label class="search-field" for="searchInput">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input id="searchInput" type="search" placeholder="Search case number, title or prompt..." autocomplete="off">
        <button id="clearSearch" class="ghost-btn" type="button" aria-label="Clear search">✕</button>
      </label>
      <div class="actions-row">
        <button id="clearFilters" class="ghost-btn clear-filter-btn" type="button">Clear filters</button>
        <div id="resultStats" class="result-stats" role="status" aria-live="polite"></div>
      </div>
    </div>
  </div>
  <div class="controls-with-right">
    <div class="right-media">
      <a href="https://image.yooart.top/" target="_blank" rel="nofollow noopener" class="right-link">

  <div class="tag-filter-container">

  </div>
</header>

<main>
  <section id="gallery" class="gallery" aria-live="polite"></section>
  <div id="emptyState" class="empty-state hidden">
    <p>No matching results. Please try adjusting tags or search keywords.</p>
  </div>
</main>

<div id="detailModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-content">
    <button id="modalClose" class="modal-close" aria-label="Close details">✕</button>

      <div id="modalSource" class="modal-source"></div>
    </header>
    <div class="modal-tags" id="modalTags"></div>
    <section id="modalImages" class="modal-section"></section>
    <section id="modalPrompts" class="modal-section"></section>

    <section id="modalNotes" class="modal-section"></section>
    <section id="modalDescription" class="modal-section"></section>
